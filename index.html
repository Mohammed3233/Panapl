<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم اللغة الإنجليزية</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            margin-bottom: 20px;
            color: #4caf50;
        }

        .btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            width: 100%;
        }

        .btn:hover {
            background-color: #45a049;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .option-btn {
            background-color: #2c2c2c;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .option-btn:hover {
            background-color: #3d3d3d;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2c2c2c;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .feedback {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .correct { color: #4caf50; }
        .wrong { color: #f44336; }

        .sentence-box {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border-right: 4px solid #4caf50;
            text-align: right;
            direction: ltr;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen">
            <h1>مرحباً بك في منصة التعلم</h1>
            <p style="margin-bottom: 20px; color: #ccc;">اضغط على الزر للبدء في اختبار كلماتك</p>
            <button class="btn" onclick="startQuiz()">ابدأ تعلم اللغة الإنجليزية الآن يا وحش</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <h2 id="question-text"></h2>
            
            <div id="options-container" class="options-grid"></div>

            <div id="rewrite-section" class="hidden">
                <p style="color: #ffca28; margin-top: 10px;">إجابة صحيحة! أعد كتابة الكلمة الآن للتثبيت:</p>
                <input type="text" id="user-input" placeholder="اكتب الكلمة بالإنجليزية هنا..." onkeypress="handleKeyPress(event)">
                <button class="btn" onclick="checkRewrite()">تأكيد الكتابة</button>
            </div>

            <div id="result-section" class="hidden">
                <div class="sentence-box">
                    <p style="color: #aaa; font-size: 12px; direction: rtl;">مثال في جملة:</p>
                    <p id="sentence-text" style="font-size: 18px; color: #fff;"></p>
                </div>
                <button class="btn" id="next-btn" onclick="nextQuestion()">السؤال التالي</button>
            </div>

            <p id="feedback-text" class="feedback"></p>
        </div>
    </div>

    <script>
        const words = [
            // الصفات
            { ar: "غضبان", en: "angry", sentence: "He was very angry with me." },
            { ar: "جميل", en: "beautiful", sentence: "It is a beautiful flower." },
            { ar: "شجاع", en: "brave", sentence: "The brave soldier protected the city." },
            { ar: "جبان", en: "coward", sentence: "Don't be a coward, face your fear." },
            { ar: "حذر / محترس", en: "careful", sentence: "Be careful when driving in the rain." },
            { ar: "غير مبالي / مهمل", en: "careless", sentence: "He lost his keys because he was careless." },
            { ar: "ذكي", en: "clever", sentence: "She is a very clever student." },
            { ar: "جذاب / كيوت", en: "cute", sentence: "Look at that cute puppy!" },
            { ar: "خطير", en: "dangerous", sentence: "The lion is a dangerous animal." },
            { ar: "سعيد", en: "happy", sentence: "I am very happy to see you." },
            { ar: "متحمس", en: "excited", sentence: "They are excited about the trip." },
            { ar: "مشهور", en: "famous", sentence: "He is a famous actor." },
            { ar: "لطيف / ودود", en: "friendly", sentence: "Our new neighbor is very friendly." },
            { ar: "محظوظ", en: "lucky", sentence: "You are lucky to have good friends." },
            { ar: "سيئ الحظ", en: "unlucky", sentence: "He was unlucky to miss the train." },
            { ar: "قبيح", en: "ugly", sentence: "That was an ugly incident." },
            { ar: "كبير في السن / قديم", en: "old", sentence: "My grandfather is an old man." },
            { ar: "صغير في السن / شاب", en: "young", sentence: "The young boy plays football well." },

            // العائلة والأشخاص
            { ar: "أب", en: "father", sentence: "My father works at a school." },
            { ar: "أم", en: "mother", sentence: "My mother cooks delicious food." },
            { ar: "أخ", en: "brother", sentence: "I played video games with my brother." },
            { ar: "عم / خال", en: "uncle", sentence: "My uncle bought a new car." },
            { ar: "عمة / خالة", en: "aunt", sentence: "My aunt makes great cakes." },
            { ar: "ابن/بنت العم أو الخال", en: "cousin", sentence: "My cousin is coming to visit us." },
            { ar: "ابنة", en: "daughter", sentence: "Their daughter is studying medicine." },
            { ar: "ابن", en: "son", sentence: "He is proud of his son." },
            { ar: "ابنة الأخ أو الأخت", en: "niece", sentence: "My niece loves drawing." },
            { ar: "ابن الأخ أو الأخت", en: "nephew", sentence: "My nephew is two years old." },
            { ar: "حفيد", en: "grandson", sentence: "The old man loves his grandson." },
            { ar: "حفيدة", en: "granddaughter", sentence: "She bought a gift for her granddaughter." },
            { ar: "زوج الأم", en: "stepfather", sentence: "His stepfather is a nice man." },
            { ar: "زوجة الأب", en: "stepmother", sentence: "Cinderella had a strict stepmother." },
            { ar: "حماه (والد الزوج/الزوجة)", en: "father-in-law", sentence: "I went fishing with my father-in-law." },
            { ar: "حماة (والدة الزوج/الزوجة)", en: "mother-in-law", sentence: "My mother-in-law invited us to dinner." },

            // المهن والشخصيات
            { ar: "محاسب", en: "accountant", sentence: "An accountant manages financial records." },
            { ar: "ممثل", en: "actor", sentence: "The actor played his role well." },
            { ar: "ممثلة", en: "actress", sentence: "She is a talented actress." },
            { ar: "مؤلف", en: "author", sentence: "The author wrote a famous book." },
            { ar: "خباز", en: "baker", sentence: "The baker sells fresh bread every morning." },
            { ar: "موظف بنك", en: "banker", sentence: "He works as a banker in the city center." },
            { ar: "حلاق", en: "barber", sentence: "I need to go to the barber today." },
            { ar: "جار", en: "neighbour", sentence: "Our neighbour helped us move the furniture." },
            { ar: "جزار", en: "butcher", sentence: "The butcher sells fresh meat." },
            { ar: "لص منازل", en: "burglar", sentence: "The burglar entered the house through the window." },
            { ar: "طاهي", en: "chef", sentence: "The chef prepared a wonderful meal." },
            { ar: "نجار", en: "carpenter", sentence: "The carpenter made a nice wooden table." },
            { ar: "مجرم", en: "criminal", sentence: "The police caught the criminal." },
            { ar: "ضابط شرطة", en: "police officer", sentence: "The police officer stopped the car." },
            { ar: "طبيب أسنان", en: "Dentist", sentence: "I went to the dentist to check my teeth." },
            { ar: "مهندس", en: "engineer", sentence: "The engineer designed a big bridge." },
            { ar: "نادل (جرسون)", en: "waiter", sentence: "The waiter brought us our drinks." },
            { ar: "نادلة (جرسونة)", en: "waitress", sentence: "The waitress was very polite." },
            { ar: "خياط", en: "tailor", sentence: "The tailor made a custom suit for me." },
            { ar: "إطفائي", en: "firefighter", sentence: "The firefighter put out the blaze." },
            { ar: "مدرب", en: "coach", sentence: "The coach trained the team for the match." },
            { ar: "محامي", en: "lawyer", sentence: "The lawyer defended his client in court." },
            { ar: "جيش", en: "army", sentence: "He joined the army after high school." },
            { ar: "جندي", en: "soldier", sentence: "The soldier showed great bravery." },

            // الفواكه
            { ar: "أناناس", en: "pineapple", sentence: "Pineapple juice is very refreshing." },
            { ar: "برقوق / بخارة", en: "plum", sentence: "She ate a ripe purple plum." },
            { ar: "فراولة", en: "strawberry", sentence: "I love strawberry ice cream." },
            { ar: "بطيخ", en: "watermelon", sentence: "Watermelon is great in summer." },
            { ar: "خوخ", en: "peach", sentence: "This peach is very soft and sweet." },
            { ar: "كمثرى", en: "pear", sentence: "He sliced a pear for breakfast." },
            { ar: "عنب", en: "grapes", sentence: "I bought fresh sweet grapes." },
            { ar: "ليمون حامض", en: "lemon", sentence: "Lemon tastes very sour." },
            { ar: "ليمون أخضر", en: "lime", sentence: "Add some lime juice to the salad." },
            { ar: "يوسفي", en: "tangerine", sentence: "Peeled a sweet tangerine for lunch." },
            { ar: "كرز", en: "cherries", sentence: "Cherries are my favorite summer fruit." },

            // الأثاث وأدوات الدراسة/المكتب
            { ar: "طاولة", en: "table", sentence: "The food is on the table." },
            { ar: "مروحة", en: "fan", sentence: "Turn on the fan, please." },
            { ar: "كنب / أريكة", en: "couch sofa", sentence: "We sat on the comfortable couch sofa." },
            { ar: "سبورة سوداء", en: "black board", sentence: "The teacher wrote on the black board." },
            { ar: "كرسي", en: "chair", sentence: "Please sit on this chair." },
            { ar: "كرسي بذراعين", en: "armchair", sentence: "Grandpa was sleeping in his armchair." },
            { ar: "خزانة كتب", en: "bookcase", sentence: "The bookcase is full of novels." },
            { ar: "رف", en: "shelf", sentence: "Put the box on the top shelf." },
            { ar: "جدار", en: "wall", sentence: "There is a nice painting on the wall." },
            { ar: "ساعة حائط", en: "clock", sentence: "The clock on the wall says 5 o'clock." },
            { ar: "تقويم", en: "calendar", sentence: "Check the date on the calendar." },
            { ar: "سرير", en: "bed", sentence: "I like to read in my bed before sleeping." },
            { ar: "بجوار", en: "next to", sentence: "The nightstand is next to the bed." },
            { ar: "مساحة / ممحاة", en: "eraser", sentence: "Use an eraser to fix the mistake." },
            { ar: "قاموس", en: "dictionary", sentence: "Look up the word in the dictionary." },
            { ar: "براية قلم رصاص", en: "pencil sharpener", sentence: "My pencil is broken, I need a pencil sharpener." },
            { ar: "سبورة بيضاء", en: "white board", sentence: "Write the answer on the white board." },
            { ar: "مصباح / أباجورة", en: "lamp", sentence: "The desk lamp is very bright." },
            { ar: "سقف", en: "roof", sentence: "The roof protects us from the rain." },
            { ar: "دفتر / كشكول", en: "notebook", sentence: "Write your notes in the notebook." },
            { ar: "قلم حبر", en: "ink pen", sentence: "Sign the paper with a blue ink pen." },

            // الملابس والأفعال المضافة
            { ar: "معطف", en: "coat", sentence: "Put on your coat, it is cold outside." },
            { ar: "قميص", en: "shirt", sentence: "He is wearing a white shirt." },
            { ar: "بدلة", en: "suit", sentence: "He wore a black suit for the wedding." },
            { ar: "رابطة عنق (كرافتة)", en: "tie", sentence: "He learned how to tie his necktie." },
            { ar: "بابيون (ربطة عنق فراشة)", en: "bow tie", sentence: "He wore a tuxedo with a red bow tie." },
            { ar: "صديرية / فيست", en: "vest", sentence: "The vest matches his suit." },
            { ar: "تنورة / جيب", en: "skirt", sentence: "She wore a blue skirt today." },
            { ar: "يطرز / يخيط", en: "sew", sentence: "My grandmother taught me how to sew." },
            { ar: "سترة / جاكيت", en: "jacket", sentence: "Take a jacket with you tonight." },
            { ar: "بنطال (بنطلون)", en: "a pair of pants", sentence: "I bought a pair of pants yesterday." },
            { ar: "زي موحد / يونيفورم", en: "uniform", sentence: "Students wear a school uniform." },
            { ar: "سترة قطنية ثقيلة", en: "sweatshirt", sentence: "A sweatshirt keeps you warm during workouts." },
            { ar: "بلوفر / سترة صوفية", en: "sweater", sentence: "She knitted a cozy sweater." },
            { ar: "حذاء برقبة (بوت)", en: "boots", sentence: "Wear your leather boots in winter." }
        ];

        let availableWords = [];
        let currentQuestion = {};

        function startQuiz() {
            availableWords = [...words];
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            nextQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getRandomOptions(correctEn) {
            let options = [correctEn];
            while (options.length < 4) {
                let randomWord = words[Math.floor(Math.random() * words.length)].en;
                if (!options.includes(randomWord)) {
                    options.push(randomWord);
                }
            }
            return shuffleArray(options);
        }

        function nextQuestion() {
            if (availableWords.length === 0) {
                availableWords = [...words];
            }

            document.getElementById('rewrite-section').classList.add('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('feedback-text').innerText = "";
            document.getElementById('user-input').value = "";
            document.getElementById('options-container').innerHTML = "";

            let randomIndex = Math.floor(Math.random() * availableWords.length);
            currentQuestion = availableWords[randomIndex];
            
            availableWords.splice(randomIndex, 1);

            document.getElementById('question-text').innerText = `ما معنى كلمة (${currentQuestion.ar}) بالإنجليزي؟`;

            let options = getRandomOptions(currentQuestion.en);
            let optionsContainer = document.getElementById('options-container');

            options.forEach(option => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => selectOption(option);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selected) {
            let feedback = document.getElementById('feedback-text');
            if (selected === currentQuestion.en) {
                feedback.innerText = "ممتاز! إجابة صحيحة.";
                feedback.className = "feedback correct";
                document.getElementById('options-container').innerHTML = ""; 
                document.getElementById('rewrite-section').classList.remove('hidden');
                document.getElementById('user-input').focus();
            } else {
                feedback.innerText = "إجابة خاطئة، حاول مرة أخرى!";
                feedback.className = "feedback wrong";
            }
        }

        function checkRewrite() {
            let userInput = document.getElementById('user-input').value.trim().toLowerCase();
            let feedback = document.getElementById('feedback-text');

            if (userInput === currentQuestion.en.toLowerCase()) {
                feedback.innerText = "أحسنت! كتبت الكلمة بالشكل الصحيح.";
                feedback.className = "feedback correct";
                document.getElementById('rewrite-section').classList.add('hidden');
                
                document.getElementById('sentence-text').innerText = currentQuestion.sentence;
                document.getElementById('result-section').classList.remove('hidden');
            } else {
                feedback.innerText = `حاول مجدداً، الإملاء الصحيح هو: (${currentQuestion.en})`;
                feedback.className = "feedback wrong";
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                checkRewrite();
            }
        }
    </script>
</body>
</html>
