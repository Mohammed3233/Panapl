        * {

        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background-color: #1e1e1e;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #333;
            text-align: center;
        }

        /* الشاشة الرئيسية */
        #welcome-screen {
            padding: 60px 20px;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
        }

        #welcome-screen h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #4caf50;
        }

        #welcome-screen p {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 40px;
        }

        .btn-main {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-main:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        /* شاشة الاختبار */
        #quiz-screen {
            display: none;
            padding: 30px 20px;
        }

        .progress-bar {
            background-color: #333;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress {
            background-color: #4caf50;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #f1f1f1;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #2a2a2a;
            color: white;
            border: 2px solid #333;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            direction: ltr;
        }

        .option-btn:hover {
            border-color: #4caf50;
            background-color: #333;
        }

        /* قسم إعادة الكتابة والصوت */
        #typing-section {
            display: none;
            margin-top: 20px;
            padding-top: 10px;
        }

        .audio-btn {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            transition: 0.2s;
        }

        .audio-btn:hover {
            background-color: #e68a00;
        }

        .success-text {
            color: #4caf50;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 2px solid #4caf50;
            background-color: #121212;
            color: white;
            text-align: center;
            margin-bottom: 15px;
            direction: ltr;
        }

        .example-box {
            display: none;
            background-color: #252525;
            border-right: 4px solid #4caf50;
            padding: 15px;
            margin: 20px 0;
            text-align: right;
            border-radius: 4px;
        }

        .example-en {
            direction: ltr;
            text-align: left;
            color: #ffeb3b;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .btn-next {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            margin: 0 auto;
        }

        .btn-next:hover {
            background-color: #0b7dda;
        }

</head>

            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            // إظهار خيارات السؤال
            document.getElementById('question-box').style.display = 'block';
            document.getElementById('typing-section').style.display = 'none';
            document.getElementById('example-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('user-input').value = '';
            document.getElementById('user-input').disabled = false;

            // تحديث شريط التقدم
            let progressPercent = ((currentIndex + 1) / dictionary.length) * 100;
            document.getElementById('progress').style.width = progressPercent + '%';

            currentWord = dictionary[currentIndex];
            document.getElementById('question-text').innerText = `ما معنى كلمة "${currentWord.ar}" بالإنجليزي؟`;

            // خلط الخيارات
            let options = [currentWord.en];
            while (options.length < 4) {
                let randomWord = dictionary[Math.floor(Math.random() * dictionary.length)].en;
                if (!options.includes(randomWord)) {
                    options.push(randomWord);
                }
            }
            
            options = shuffle(options);

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => checkAnswer(option, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOption, btn) {
            if (selectedOption === currentWord.en) {
                // نطق الكلمة فور اختيار الإجابة الصحيحة
                speakWord();

                // إخفاء خيارات الأسئلة والكلمات لعدم الغش!
                document.getElementById('question-box').style.display = 'none';
                
                // إظهار قسم الإملاء الصوت والكتّابة
                document.getElementById('typing-section').style.display = 'block';
                document.getElementById('user-input').focus();
            } else {
                // إجابة خاطئة
                btn.style.backgroundColor = '#f44336';
                btn.style.borderColor = '#f44336';
            }
        }

        // دالة نطق الكلمة باللكنة الأمريكية
        function speakWord() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(currentWord.en);
                utterance.lang = 'en-US'; // اللكنة الأمريكية
                utterance.rate = 0.9; // سرعة معتدلة وواضحة
                window.speechSynthesis.speak(utterance);
            }
        }

        // التحقق عند الكتابة في الخانة
        document.getElementById('user-input').addEventListener('input', function(e) {
            let typedText = e.target.value.trim().toLowerCase();
            if (typedText === currentWord.en.toLowerCase()) {
                this.disabled = true;
                
                // إظهار المثال والجملة
                document.getElementById('example-en').innerText = currentWord.sentenceEn;
                document.getElementById('example-ar').innerText = currentWord.sentenceAr;
                document.getElementById('example-box').style.display = 'block';
                
                // إظهار زر التالي
                document.getElementById('next-btn').style.display = 'block';
            }
        });

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < dictionary.length) {
                loadQuestion();
            } else {
                alert('ألف مبروك يا وحش! أتممت كل الكلمات بنجاح 🔥💪');
                startQuiz();
            }
        }
    </script>
</body>
</html>
